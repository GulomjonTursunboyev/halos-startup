# HALOS Bot - Render.com Configuration with Supabase
services:
  # HALOS Telegram Bot Web Service (Webhook mode)
  - type: web
    name: halos-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot_webhook.py
    plan: free
    region: frankfurt
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        value: "7152317007"
      - key: DATABASE_URL
        sync: false
      - key: CLICK_SERVICE_ID
        value: "13464"
      - key: CLICK_MERCHANT_ID
        value: "13464"
      - key: CLICK_MERCHANT_USER_ID
        value: "333605228"
      - key: CLICK_SECRET_KEY
        value: "31ACF1A3C571667379481B13BEDCCA774AEBA199"
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.4"

databases:
  # PostgreSQL Database (Free tier - 90 days)
  - name: halos-db
    databaseName: halos_production
    user: halos_user
    plan: free
    region: frankfurt

services:
  # HALOS Telegram Bot Web Service (Webhook mode)
  - type: web
    name: halos-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn bot_webhook:flask_app --bind 0.0.0.0:$PORT --worker-class gthread --threads 4
    plan: free
    region: frankfurt
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        value: "7152317007"
      - key: DATABASE_URL
        fromDatabase:
          name: halos-db
          property: connectionString
      - key: CLICK_SERVICE_ID
        value: "13464"
      - key: CLICK_MERCHANT_ID
        value: "13464"
      - key: CLICK_MERCHANT_USER_ID
        value: "333605228"
      - key: CLICK_SECRET_KEY
        value: "31ACF1A3C571667379481B13BEDCCA774AEBA199"
      - key: PYTHON_VERSION
        value: "3.11.4"

services:
  # Telegram Bot Worker Service
  - type: worker
    name: solvo-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    plan: free
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: CLICK_SERVICE_ID
        value: "13464"
      - key: CLICK_MERCHANT_ID
        value: "13464"
      - key: CLICK_MERCHANT_USER_ID
        value: "333605228"
      - key: CLICK_SECRET_KEY
        value: "31ACF1A3C571667379481B13BEDCCA774AEBA199"

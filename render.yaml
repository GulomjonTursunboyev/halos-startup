services:
  - type: worker
    name: solvo-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
  - type: web
    name: solvo-click
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.click_webhook:app
    plan: free
    envVars:
      - key: PORT
        value: 10000
